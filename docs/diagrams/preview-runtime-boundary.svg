<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">World rule preview runtime boundary</title>
  <desc id="desc">A diagram showing the boundary between deterministic world rules, the browser preview runtime, chunk construction, and user exploration state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091018"/>
      <stop offset="1" stop-color="#14120d"/>
    </linearGradient>
    <style>
      .label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}
      .title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}
      .panel{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}
      .rule{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}
      .mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}
      .wire{stroke:#8fdcff;stroke-width:2.6;fill:none}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="label">RULE EXPLORER</text>
  <text x="70" y="132" class="title">A live debugger for deterministic world rules.</text>
  <text x="70" y="168" class="copy">It renders the same generator used by the client, but keeps camera, cache, and UI state outside the rule contract.</text>

  <rect x="70" y="232" width="500" height="344" class="panel"/>
  <text x="104" y="282" class="rule">Rule contract</text>
  <text x="104" y="320" class="mono">setWorldSeed(seed)</text>
  <text x="104" y="350" class="mono">terrainProfile(x, z)</text>
  <text x="104" y="380" class="mono">getGeneratedBlock(x, y, z)</text>
    <text x="104" y="426" class="small">Biome, height, fluid, cave, and block IDs</text>
    <text x="104" y="450" class="small">remain deterministic inputs to the renderer.</text>
  <g transform="translate(392 292)">
    <rect width="124" height="124" rx="18" fill="#0d1a22" stroke="#31546b"/>
    <rect x="25" y="28" width="34" height="34" fill="#5fbf48"/>
    <rect x="59" y="28" width="34" height="34" fill="#7a5230"/>
    <rect x="25" y="62" width="34" height="34" fill="#777"/>
    <rect x="59" y="62" width="34" height="34" fill="#2f7ed8"/>
  </g>

  <rect x="710" y="232" width="500" height="344" class="panel"/>
  <text x="744" y="282" class="rule">Preview runtime</text>
  <text x="744" y="320" class="small">Three.js camera and flight controls</text>
  <text x="744" y="350" class="small">chunk build queues and preload cache</text>
  <text x="744" y="380" class="small">procedural materials and clock updates</text>
  <text x="744" y="410" class="small">localStorage view persistence</text>
  <text x="744" y="456" class="mono">createChunkGroup()</text>
  <text x="744" y="486" class="mono">createWorldMaterials()</text>
  <g transform="translate(1050 306)">
    <path d="M0 102 L56 20 L112 102 Z" fill="#24333c" stroke="#8fdcff"/>
    <path d="M23 102 L56 52 L90 102 Z" fill="#83ff00" opacity=".75"/>
  </g>

  <path class="wire" d="M570 344 C620 318 660 318 710 344"/>
  <path class="wire" d="M710 464 C646 496 628 496 570 464"/>
  <text x="594" y="314" class="small">block data</text>
  <text x="592" y="520" class="small">no rule mutation</text>

  <text x="96" y="636" class="copy">A broken preview should never imply a changed world rule. A changed rule should be visible as a deterministic output change.</text>
</svg>
