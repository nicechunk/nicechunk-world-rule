<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Rule inspection loop</title>
  <desc id="desc">A diagram showing how the world rule page lets a developer inspect generated terrain, compare rule output, and update documentation without changing the generator.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#091018"/><stop offset="1" stop-color="#14120d"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#8fdcff"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.line{stroke:#8fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="220" cy="130" r="250" fill="#00c2ff" opacity=".07"/><circle cx="1050" cy="610" r="280" fill="#83ff00" opacity=".07"/>
  <text x="70" y="78" class="label">WORLD RULE INSPECTION</text>
  <text x="70" y="132" class="title">The page should make rule changes visible.</text>
  <text x="70" y="168" class="copy">A developer changes generator logic in worldgen, then uses this repository to inspect and explain the visible consequences.</text>
  <g transform="translate(88 254)"><rect class="card" width="210" height="170"/><text x="24" y="42" class="head">Select view</text><text x="24" y="78" class="small">seed</text><text x="24" y="108" class="small">position</text><text x="24" y="138" class="small">camera preset</text></g>
  <path class="line" d="M298 338 H356"/>
  <g transform="translate(378 224)"><rect class="card" width="250" height="230"/><text x="24" y="42" class="head">Generate sample</text><text x="24" y="78" class="mono">terrainProfile()</text><text x="24" y="108" class="mono">getGeneratedBlock()</text><text x="24" y="146" class="small">build chunk preview</text><text x="24" y="176" class="small">render material state</text></g>
  <path class="line" d="M628 338 H686"/>
  <g transform="translate(708 224)"><rect class="card" width="250" height="230"/><text x="24" y="42" class="head">Inspect delta</text><text x="24" y="78" class="small">height changes</text><text x="24" y="108" class="small">biome boundaries</text><text x="24" y="138" class="small">water behavior</text><text x="24" y="168" class="small">block categories</text><text x="24" y="198" class="mono">visible output</text></g>
  <path class="line" d="M958 338 H1016"/>
  <g transform="translate(1038 254)"><rect class="card" width="170" height="170"/><text x="24" y="42" class="head">Explain</text><text x="24" y="78" class="small">copy</text><text x="24" y="108" class="small">screenshots</text><text x="24" y="138" class="small">release notes</text></g>
  <path class="line" d="M1080 454 C976 572 302 572 194 424"/>
  <g transform="translate(300 586)"><rect class="card" width="680" height="62"/><text x="26" y="39" class="small">The loop documents what changed; it does not mutate the reusable world generation contract.</text></g>
</svg>
